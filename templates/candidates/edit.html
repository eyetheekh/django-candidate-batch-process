{% block title %}Edit Candidate{% endblock %}

{% block content %}

<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">EDIT</button>
    <a href="{% url 'candidate_detail' candidate.id %}" class="btn btn-secondary">View</a>
</form>

{% endblock %}
