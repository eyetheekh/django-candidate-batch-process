{% extends "base.html" %}

{% block title %}Login{% endblock %}

{% block content %}

<h2>Login</h2>

{% if messages %}
{% for message in messages %}
<p class="{% if message.tags %}{{ message.tags }}{% endif %}">
    {{ message }}
</p>
{% endfor %}
{% endif %}

<form method="post">
    {% csrf_token %}

    <div>
        <label>Email</label>
        {{ form.email }}
    </div>

    <div>
        <label>Password</label>
        {{ form.password }}
    </div>

    <button type="submit">Login</button>
</form>

{% endblock %}
