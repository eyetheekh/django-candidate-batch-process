{% load static %}
<!DOCTYPE html>
<html>

<head>
    <title>{% block title %}MSigma System{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'css/main.css' %}">
</head>

<body>

    <nav class="navbar">
        <div class="nav-left">
            <a href="/">MSigma</a>
        </div>
        <div class="nav-right">
            {% if user.is_authenticated %}
            <span>{{ user.email }} ({{ user.role }})</span>
            <a href="{% url 'logout' %}">Logout</a>
            {% else %}
            <a href="/users/login/">Login</a>
            <a href="/users/signup/">Signup</a>
            {% endif %}
        </div>
    </nav>

    <div class="container">
        {% block content %}{% endblock %}
    </div>

</body>

</html>
