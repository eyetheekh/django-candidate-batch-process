version: '3.8'
services:
  postgres:
    image: 'postgres:16-alpine'
    container_name: postgres_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: prod_candidate_batch_process
    ports:
      - '5432:5432'
    volumes:
      - 'postgres_data:/var/lib/postgresql/data'
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: 'redis:7-alpine'
    container_name: redis_cache
    ports:
      - '6379:6379'
    volumes:
      - 'redis_data:/data'
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  migrater:
    image: candidate_ingestion_batch_processing:django-v1.0.0
    build:
      context: .
      dockerfile: Dockerfiles/Dockerfile
    container_name: django_migrater
    command: python manage.py migrate
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  seeder:
    image: candidate_ingestion_batch_processing:django-v1.0.0
    build:
      context: .
      dockerfile: Dockerfiles/Dockerfile
    container_name: django_seeder
    command: python manage.py seed --candidates 1000
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      migrater:
        condition: service_completed_successfully
    restart: "no"

  web:
    image: candidate_ingestion_batch_processing:django-v1.0.0
    build:
      context: .
      dockerfile: Dockerfiles/Dockerfile
    container_name: django_web
    command: >
      sh -c "gunicorn config.wsgi:application --bind 0.0.0.0:8000"
    ports:
      - '8000:8000'
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://0.0.0.0:8000/api/health/"]
      interval: 10s
      timeout: 5s
      retries: 5

  worker:
    image: candidate_ingestion_batch_processing:worker-v1.0.0
    build:
      context: .
      dockerfile: Dockerfiles/Dockerfile
    container_name: celery_worker
    command: celery -A apps.core.celery_app worker -l info
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      web:
        condition: service_healthy
      seeder:
        condition: service_completed_successfully
    restart: unless-stopped

  beat:
    image: candidate_ingestion_batch_processing:beat-v1.0.0
    build:
      context: .
      dockerfile: Dockerfiles/Dockerfile
    container_name: celery_beat
    command: celery -A apps.core.celery_app beat -l info
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      web:
        condition: service_healthy
      seeder:
        condition: service_completed_successfully
    volumes:
      - 'celerybeat_data:/app/celerybeat'
    restart: unless-stopped

volumes:
  postgres_data: null
  redis_data: null
  celerybeat_data: null

networks:
  default:
    name: candidate_ingestion_batch_processing
